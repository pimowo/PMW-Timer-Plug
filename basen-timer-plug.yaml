# PMW Timer Plug (szablon startowy)
# Docelowy projekt wymaga rozbudowanej logiki i własnego panelu WWW.
# Ten plik stanowi gotowy punkt wyjścia dla Sonoff S26 / AIS Dom S26.

esphome:
  name: basen-timer-plug
  friendly_name: Basen Timer Plug

esp8266:
  board: esp01_1m

logger:

api:
  encryption:
    key: "l8tsH4WscrbqmnsN3MfsA4QKBYI02q4cVFp4uaMxa8E="

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: basen-timer-plu Fallback Hotspot
    password: "OKdejEN8APrb"

captive_portal:

web_server:
  port: 80

time:
  - platform: sntp
    id: ntp_time
    timezone: Europe/Warsaw

switch:
  - platform: gpio
    id: relay
    name: "Relay"
    pin: GPIO12
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    id: auto_mode
    name: "Auto Cycle"
    lambda: |-
      return id(auto_enabled);
    turn_on_action:
      - lambda: |-
          id(auto_enabled)=true;
    turn_off_action:
      - lambda: |-
          id(auto_enabled)=false;
          id(relay).turn_off();

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
    name: "Button"

status_led:
  pin:
    number: GPIO13
    inverted: true

number:
  - platform: template
    id: on_minutes
    name: "ON Time"
    optimistic: true
    restore_value: true
    min_value: 1
    max_value: 240
    step: 1
    initial_value: 15

  - platform: template
    id: off_minutes
    name: "OFF Time"
    optimistic: true
    restore_value: true
    min_value: 1
    max_value: 240
    step: 1
    initial_value: 45

  - platform: template
    id: start_hour
    name: "Start Hour"
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 8

  - platform: template
    id: start_minute
    name: "Start Minute"
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 59
    step: 1
    initial_value: 0

  - platform: template
    id: stop_hour
    name: "Stop Hour"
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 20

  - platform: template
    id: stop_minute
    name: "Stop Minute"
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 59
    step: 1
    initial_value: 0
    
globals:
  - id: auto_enabled
    type: bool
    restore_value: yes
    initial_value: "false"

  - id: relay_phase
    type: bool
    restore_value: no
    initial_value: "true"

  - id: cycle_counter
    type: uint32_t
    restore_value: yes
    initial_value: "0"

button:
  - platform: template
    name: "Start Cycle"
    on_press:
      - lambda: |-
          id(cycle_enabled)=true;

  - platform: template
    name: "Stop Cycle"
    on_press:
      - lambda: |-
          id(cycle_enabled)=false;
          id(relay).turn_off();

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(cycle_enabled);'
          then:
            - lambda: |-
                static bool phase = false;
                static uint32_t phase_start = 0;

                auto now = id(ntp_time).now();

                if (now.is_valid()) {
                  bool allowed =
                      now.hour >= (int)id(start_hour).state &&
                      now.hour < (int)id(stop_hour).state;

                  if (!allowed) {
                    id(relay).turn_off();
                    phase = false;
                    phase_start = millis();
                    return;
                  }
                }

                uint32_t elapsed = (millis() - phase_start) / 1000;

                uint32_t target = phase
                  ? (uint32_t)id(on_time).state * 60
                  : (uint32_t)id(off_time).state * 60;

                if (elapsed >= target) {
                  phase = !phase;
                  phase_start = millis();

                  if (phase)
                    id(relay).turn_on();
                  else
                    id(relay).turn_off();
                }
