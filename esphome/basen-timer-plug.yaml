# Basen Timer Plug (v0.2.3)
# Lokalny sterownik czasowy dla Sonoff S26 / AIS Dom S26
# Logika: Auto Cycle ON/OFF z harmonogramem godzinowym

esphome:
  name: basen-timer-plug
  friendly_name: Basen Timer Plug

  on_boot:
    priority: -100
    then:
      - lambda: |-
          if (id(auto_enabled)) {
            id(relay_phase) = true;
            id(phase_start) = millis();
          }
          // Opublikuj licznik cykli przy starcie
          id(cycle_counter_sensor).publish_state(id(cycle_counter));

esp8266:
  board: esp01_1m

logger:

api:
  encryption:
    key: "l8tsH4WscrbqmnsN3MfsA4QKBYI02q4cVFp4uaMxa8E="

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: basen-timer-plug Fallback Hotspot
    password: "OKdejEN8APrb"

captive_portal:

web_server:
  port: 80

preferences:
  flash_write_interval: 5min

time:
  - platform: sntp
    id: ntp_time
    timezone: Europe/Warsaw

switch:
  - platform: gpio
    id: relay
    name: "Output Relay"
    icon: mdi:power-socket-eu
    pin: GPIO12
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    id: auto_mode
    name: "Auto Cycle"
    icon: mdi:timer-sync
    lambda: |-
      return id(auto_enabled);
    turn_on_action:
      - lambda: |-
          id(auto_enabled) = true;
          id(relay_phase) = true;
          id(phase_start) = millis();
          id(relay).turn_on();
    turn_off_action:
      - lambda: |-
          id(auto_enabled) = false;
          id(relay).turn_off();
          id(relay_phase) = true;
          id(phase_start) = millis();

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
    name: "Button"
    internal: true
    on_press:
      - switch.toggle: auto_mode

status_led:
  pin:
    number: GPIO13
    inverted: true

number:
  - platform: template
    id: on_minutes
    name: "ON Time"
    optimistic: true
    restore_value: true
    min_value: 1
    max_value: 240
    step: 1
    initial_value: 15

  - platform: template
    id: off_minutes
    name: "OFF Time"
    optimistic: true
    restore_value: true
    min_value: 1
    max_value: 240
    step: 1
    initial_value: 45

  - platform: template
    id: start_hour
    name: "Start Hour"
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 8

  - platform: template
    id: start_minute
    name: "Start Minute"
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 59
    step: 1
    initial_value: 0

  - platform: template
    id: stop_hour
    name: "Stop Hour"
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 23
    step: 1
    initial_value: 20

  - platform: template
    id: stop_minute
    name: "Stop Minute"
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 59
    step: 1
    initial_value: 0

sensor:
  - platform: template
    id: cycle_counter_sensor
    name: "Cycle Counter"
    unit_of_measurement: "cycles"
    icon: mdi:counter
    update_interval: never
    lambda: |-
      return id(cycle_counter);

globals:
  - id: auto_enabled
    type: bool
    restore_value: yes
    initial_value: "false"

  - id: relay_phase
    type: bool
    restore_value: no
    initial_value: "true"

  - id: phase_start
    type: uint32_t
    restore_value: no
    initial_value: "0"

  - id: cycle_counter
    type: uint32_t
    restore_value: yes
    initial_value: "0"

  - id: was_allowed
    type: bool
    restore_value: no
    initial_value: "false"

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return id(auto_enabled);'
          then:
            - lambda: |-
                auto now = id(ntp_time).now();

                if (!now.is_valid()) {
                  if (id(relay).state) {
                    id(relay).turn_off();
                  }
                  id(relay_phase) = true;
                  id(phase_start) = millis();
                  id(was_allowed) = false;
                  return;
                }

                // Konwertuj bieżący czas na minuty
                int now_minutes = now.hour * 60 + now.minute;
                int start_minutes = (int)id(start_hour).state * 60 + (int)id(start_minute).state;
                int stop_minutes = (int)id(stop_hour).state * 60 + (int)id(stop_minute).state;

                // Sprawdź, czy jesteśmy w harmonogramie
                // Obsługuje zakresy normalne (08:00-20:00) i przez północ (22:00-06:00)
                bool allowed;
                if (start_minutes <= stop_minutes) {
                  allowed = now_minutes >= start_minutes && now_minutes < stop_minutes;
                } else {
                  allowed = now_minutes >= start_minutes || now_minutes < stop_minutes;
                }

                // Wykryj zmianę stanu harmonogramu
                if (allowed != id(was_allowed)) {
                  id(was_allowed) = allowed;

                  if (allowed) {
                    // Przejście do harmonogramu: false → true
                    id(relay_phase) = true;
                    id(phase_start) = millis();
                    if (!id(relay).state) {
                      id(relay).turn_on();
                    }
                  } else {
                    // Wyjście z harmonogramu: true → false
                    if (id(relay).state) {
                      id(relay).turn_off();
                    }
                    id(relay_phase) = true;
                    id(phase_start) = millis();
                  }
                  return;
                }

                // Jeśli nie jesteśmy w harmonogramie, nie rób nic więcej
                if (!allowed) {
                  return;
                }

                // Oblicz czas trwania bieżącej fazy
                // millis() przepełnia się po ok. 49 dniach.
                // Odejmowanie uint32_t pozostaje poprawne również po przepełnieniu.
                uint32_t elapsed = (millis() - id(phase_start)) / 1000;
                uint32_t target = id(relay_phase)
                  ? (uint32_t)id(on_minutes).state * 60
                  : (uint32_t)id(off_minutes).state * 60;

                // Zmień fazę jeśli czas upłynął
                if (elapsed >= target) {
                  id(relay_phase) = !id(relay_phase);
                  id(phase_start) = millis();

                  // Zwiększ licznik przy przejściu OFF → ON
                  if (id(relay_phase)) {
                    id(cycle_counter)++;
                    id(cycle_counter_sensor).publish_state(id(cycle_counter));
                  }

                  // Włącz/wyłącz relay
                  if (id(relay_phase)) {
                    id(relay).turn_on();
                  } else {
                    id(relay).turn_off();
                  }
                }
